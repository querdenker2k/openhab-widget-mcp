# GitHub Actions Workflow for Building and Pushing Docker Images
#
# Best Practice for Releases:
# 1. Finalize code and tests.
# 2. (Optional) Set new version in pom.xml: mvn versions:set -DnewVersion=1.2.3
# 3. Create and push a tag:
#    git add .
#    git commit -m "Release v1.2.3"
#    git tag -a v1.2.3 -m "Version 1.2.3"
#    git push origin main --tags
#
# This workflow will automatically:
# - Set the Maven version in pom.xml to match the Git tag (e.g., '1.2.3' from 'v1.2.3').
# - Build and push to GHCR as 'latest' on every push to 'main'.
# - Build and push with version tag (e.g., '1.2.3') when a tag 'v*.*.*' is pushed.

name: Build and Push Docker image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: querdenker2k/openhab-widget-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set project version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/querdenker2k/openhab-widget-mcp
            org.opencontainers.image.description=MCP Server for OpenHAB Widgets
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
