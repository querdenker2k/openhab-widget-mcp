openhab:
  url: http://localhost:8080
  api-token: ""
  username: ""
  password: ""
  output-dir: openhab-screenshots
  page-width: 1200
  page-height: 800

quarkus:
  banner:
    path: banner.txt
    enabled: false
  container-image:
    registry: ghcr.io
    group: querdenker2k
    build: true
    push: false
    image: "openhab-widget-mcp"
    tag: "${project.version}"
    builder: docker
  rest-client:
    openhab:
      url: ${openhab.url}
      read-timeout: 30000
      connect-timeout: 5000

  mcp:
    server:
      server-info:
        name: openhab-widget-mcp
        version: 1.0.0

  swagger-ui:
    always-include: true
    path: /q/swagger-ui

  smallrye-openapi:
    info-title: OpenHAB Widget MCP API
    info-version: 1.0.0
    info-description: REST API and MCP server for managing OpenHAB custom widgets and items

  http:
    cors:
      enabled: true
    port: 8081
    test-port: 0

  log:
    level: INFO
    category:
      "org.openhab":
        level: INFO
